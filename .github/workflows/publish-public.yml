name: Publish Public

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.0.1, no v prefix) — must match a git tag vX.Y.Z on main"
        required: true
        type: string
      dry_run:
        description: "Dry run (skip npm publish)"
        required: false
        default: false
        type: boolean

jobs:
  publish-public:
    name: Publish to npmjs.com
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      actions: read
    steps:
      - name: Retrieve Secrets from Vault
        id: vault
        uses: hashicorp/vault-action@v4.0.0
        with:
          url: ${{ secrets.VAULT_URL }}
          role: ${{ github.event.repository.name }}-github-action
          method: jwt
          path: github-actions
          exportEnv: false
          secrets: |
            github/token/${{ github.event.repository.name }}-semantic-release token | GITHUB_TOKEN ;

      - name: Checkout at version tag
        uses: actions/checkout@v6
        with:
          ref: v${{ inputs.version }}
          token: ${{ steps.vault.outputs.GITHUB_TOKEN }}

      - name: Validate version tag exists
        run: |
          git fetch --tags
          if ! git rev-parse "v${{ inputs.version }}" > /dev/null 2>&1; then
            echo "Error: tag v${{ inputs.version }} does not exist"
            exit 1
          fi
          echo "Tag v${{ inputs.version }} confirmed"

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: |
          pnpm --filter @contentful/experience-design-system-types run build
          pnpm --filter @contentful/experience-design-system-cli run build

      - name: Configure npm auth
        run: |
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" >> ~/.npmrc
          echo "@contentful:registry=https://registry.npmjs.org" >> ~/.npmrc
        env:
          NODE_AUTH_TOKEN: ${{ steps.vault.outputs.GITHUB_TOKEN }}

      - name: Publish @contentful/experience-design-system-types
        if: ${{ !inputs.dry_run }}
        run: pnpm --filter @contentful/experience-design-system-types publish --access public --no-git-checks

      - name: Publish @contentful/experience-design-system-cli
        if: ${{ !inputs.dry_run }}
        run: pnpm --filter @contentful/experience-design-system-cli publish --access public --no-git-checks

      - name: Dry run — show what would be published
        if: ${{ inputs.dry_run }}
        run: |
          echo "[dry-run] Would publish @contentful/experience-design-system-types to npmjs.com"
          pnpm --filter @contentful/experience-design-system-types publish --access public --no-git-checks --dry-run
          echo ""
          echo "[dry-run] Would publish @contentful/experience-design-system-cli to npmjs.com"
          pnpm --filter @contentful/experience-design-system-cli publish --access public --no-git-checks --dry-run
