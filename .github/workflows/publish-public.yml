name: Publish Public

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"  # Auto-publish on stable release tags
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 2.3.1, no v prefix) — must match a git tag vX.Y.Z on main"
        required: true
        type: string
      dry_run:
        description: "Dry run (skip npm publish)"
        required: false
        default: false
        type: boolean

jobs:
  publish-public:
    name: Publish to npmjs.com
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for OIDC trusted publishing
      actions: read
    steps:
      - name: Retrieve Secrets from Vault
        id: vault
        uses: hashicorp/vault-action@v4.0.0
        with:
          url: ${{ secrets.VAULT_URL }}
          role: ${{ github.event.repository.name }}-github-action
          method: jwt
          path: github-actions
          exportEnv: false
          secrets: |
            github/token/${{ github.event.repository.name }}-semantic-release token | GITHUB_TOKEN ;
            secret/data/npm/contentful-publish token | NPM_TOKEN ;

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi

      - name: Checkout at version tag
        uses: actions/checkout@v6
        with:
          ref: v${{ steps.version.outputs.version }}
          token: ${{ steps.vault.outputs.GITHUB_TOKEN }}

      - name: Validate version tag exists
        run: |
          git fetch --tags
          if ! git rev-parse "v${{ steps.version.outputs.version }}" > /dev/null 2>&1; then
            echo "Error: tag v${{ steps.version.outputs.version }} does not exist"
            exit 1
          fi
          echo "Tag v${{ steps.version.outputs.version }} confirmed"

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          registry-url: "https://registry.npmjs.org"  # Wires up OIDC token as NODE_AUTH_TOKEN

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: |
          pnpm --filter @contentful/experience-design-system-types run build
          pnpm --filter @contentful/experience-design-system-cli run build

      - name: Publish @contentful/experience-design-system-types
        if: ${{ inputs.dry_run != true }}
        run: pnpm --filter @contentful/experience-design-system-types publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ steps.vault.outputs.NPM_TOKEN }}

      - name: Publish @contentful/experience-design-system-cli
        if: ${{ inputs.dry_run != true }}
        run: pnpm --filter @contentful/experience-design-system-cli publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ steps.vault.outputs.NPM_TOKEN }}

      - name: Dry run — show what would be published
        if: ${{ inputs.dry_run == true }}
        run: |
          echo "[dry-run] Would publish @contentful/experience-design-system-types to npmjs.com"
          pnpm --filter @contentful/experience-design-system-types publish --access public --no-git-checks --dry-run
          echo ""
          echo "[dry-run] Would publish @contentful/experience-design-system-cli to npmjs.com"
          pnpm --filter @contentful/experience-design-system-cli publish --access public --no-git-checks --dry-run
