name: CI

on:
  push:
    branches:
      - main
      - canary
    paths:
      - "packages/**"
      - "tools/**"
  pull_request:
    branches:
      - main
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' || github.event_name == 'merge_group' }}

permissions: {}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'merge_group' || (github.event_name == 'push' && github.event.head_commit.author.name != 'contentful-automation[bot]')
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #v6.0.3
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "lts/*"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set NX SHAs
        uses: nrwl/nx-set-shas@afb73a62d26e41464e9254689e1fd6122ee683c1 # v5.0.1

      - name: Validate PR title with commitlint
        if: github.event_name == 'pull_request'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: printf '%s\n' "$PR_TITLE" | npx commitlint --verbose

      - name: Lint source
        run: pnpm affected:lint

  test:
    name: Test
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'merge_group' || (github.event_name == 'push' && github.event.head_commit.author.name != 'contentful-automation[bot]')
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #v6.0.3
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "lts/*"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set NX SHAs
        uses: nrwl/nx-set-shas@afb73a62d26e41464e9254689e1fd6122ee683c1 # v5.0.1

      - name: Typecheck
        run: pnpm typecheck

      - name: Run tests
        run: pnpm affected:test

      - name: Build
        run: pnpm affected:build

  pty-test:
    name: PTY smoke tests
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'merge_group' || (github.event_name == 'push' && github.event.head_commit.author.name != 'contentful-automation[bot]')
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #v6.0.3
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "lts/*"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build CLI
        run: pnpm exec nx build experience-design-system-cli

      - name: Run PTY smoke tests
        run: pnpm exec nx run dsi-pty-harness:pty-test

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [lint, test, pty-test]
    if: always()
    permissions: {}
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.lint.result }}" == "failure" || "${{ needs.test.result }}" == "failure" || "${{ needs.pty-test.result }}" == "failure" ]]; then
            exit 1
          fi

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main' && github.event.head_commit.author.name != 'contentful-automation[bot]') ||
      (github.event_name == 'push' && github.ref == 'refs/heads/canary' && github.actor != 'dependabot[bot]' && github.event.head_commit.author.name != 'contentful-automation[bot]') ||
      github.event_name == 'pull_request'
    permissions:
      contents: write
      id-token: write
      actions: read
    concurrency:
      group: release-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Retrieve Secrets from Vault
        id: vault
        uses: hashicorp/vault-action@892a26828f195e65540a40b4768ae4571f51ebfc # v4.0.0
        with:
          url: ${{ secrets.VAULT_URL }}
          role: ${{ github.event.repository.name }}-github-action
          method: jwt
          path: github-actions
          exportEnv: false
          secrets: |
            github/token/${{ github.event.repository.name }}-semantic-release token | GITHUB_TOKEN ;
            secret/data/github/github_packages_write GITHUB_PACKAGES_WRITE_TOKEN | GITHUB_PACKAGES_WRITE_TOKEN ;

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #v6.0.3
        with:
          fetch-depth: 0
          token: ${{ steps.vault.outputs.GITHUB_TOKEN }}

      - name: Configure Git
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/canary'
        run: |
          git config --global user.name "contentful-automation[bot]"
          user_id=$(gh api "/users/contentful-automation[bot]" --jq .id)
          git config --global user.email "${user_id}+contentful-automation[bot]@users.noreply.github.com"
        env:
          GITHUB_TOKEN: ${{ steps.vault.outputs.GITHUB_TOKEN }}

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "lts/*"

      - name: Install dependencies
        run: |
          pnpm config set @contentful:registry https://npm.pkg.github.com
          pnpm config set -- //npm.pkg.github.com/:_authToken ${{ steps.vault.outputs.GITHUB_PACKAGES_WRITE_TOKEN }}
          pnpm install --frozen-lockfile

      - name: Set NX SHAs
        uses: nrwl/nx-set-shas@afb73a62d26e41464e9254689e1fd6122ee683c1 # v5.0.1

      - name: Pull latest changes from main
        if: github.ref == 'refs/heads/main'
        run: git pull --rebase origin main

      - name: Sync main into canary
        if: github.ref == 'refs/heads/canary'
        run: |
          git fetch origin main
          git merge origin/main --no-edit

      - name: Release
        run: pnpm release
        env:
          GITHUB_TOKEN: ${{ steps.vault.outputs.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ steps.vault.outputs.GITHUB_PACKAGES_WRITE_TOKEN }}
