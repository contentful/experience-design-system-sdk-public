name: CI

on:
  push:
    branches:
      - main
    paths:
      - "packages/**"
  pull_request:
    branches:
      - main
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' || github.event_name == 'merge_group' }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'merge_group' || (github.event_name == 'push' && github.event.head_commit.author.name != 'contentful-automation[bot]')
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"

      - name: Install dependencies
        run: |
          pnpm config set @contentful:registry https://npm.pkg.github.com
          pnpm config set -- //npm.pkg.github.com/:_authToken ${{ secrets.GITHUB_PACKAGES_READ_TOKEN }}
          pnpm config set auto-install-peers true
          pnpm install --frozen-lockfile

      - name: Set NX SHAs
        uses: nrwl/nx-set-shas@v5

      - name: Validate PR title with commitlint
        if: github.event_name == 'pull_request'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: printf '%s\n' "$PR_TITLE" | npx commitlint --verbose

      - name: Lint source
        run: pnpm affected:lint

  test:
    name: Test
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'merge_group' || (github.event_name == 'push' && github.event.head_commit.author.name != 'contentful-automation[bot]')
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"

      - name: Install dependencies
        run: |
          pnpm config set @contentful:registry https://npm.pkg.github.com
          pnpm config set -- //npm.pkg.github.com/:_authToken ${{ secrets.GITHUB_PACKAGES_READ_TOKEN }}
          pnpm config set auto-install-peers true
          pnpm install --frozen-lockfile

      - name: Set NX SHAs
        uses: nrwl/nx-set-shas@v5

      - name: Typecheck
        run: pnpm typecheck

      - name: Run tests
        run: pnpm affected:test

      - name: Build
        run: pnpm affected:build

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: >-
      (github.ref == 'refs/heads/main' && github.event_name == 'push' && github.event.head_commit.author.name != 'contentful-automation[bot]') ||
      (github.ref != 'refs/heads/main' && github.event_name == 'push') ||
      github.event_name == 'pull_request'
    permissions:
      contents: write
      actions: read
    concurrency:
      group: release-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_GITHUB_TOKEN }}

      - name: Configure Git (main only)
        if: github.ref == 'refs/heads/main'
        run: |
          git config --global user.name "contentful-automation[bot]"
          user_id=$(gh api "/users/contentful-automation[bot]" --jq .id)
          git config --global user.email "${user_id}+contentful-automation[bot]@users.noreply.github.com"
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN }}

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"

      - name: Install dependencies
        run: |
          pnpm config set @contentful:registry https://npm.pkg.github.com
          pnpm config set -- //npm.pkg.github.com/:_authToken ${{ secrets.GITHUB_PACKAGES_WRITE_TOKEN }}
          pnpm install --frozen-lockfile

      - name: Set NX SHAs
        uses: nrwl/nx-set-shas@v5

      - name: Pull latest changes from main (main only)
        if: github.ref == 'refs/heads/main'
        run: git pull --rebase origin main

      - name: Release
        run: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.GITHUB_PACKAGES_WRITE_TOKEN }}
