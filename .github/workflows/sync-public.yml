name: Sync Public Repo

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"  # Only stable releases — no prereleases

concurrency:
  group: sync-public
  cancel-in-progress: false  # Queue rather than cancel — every tag must sync

jobs:
  sync:
    name: Sync to public repo and publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      actions: read
    steps:
      - name: Retrieve Secrets from Vault
        id: vault
        uses: contentful/vault-github-actions/action@v1
        with:
          url: ${{ secrets.VAULT_URL }}
          template-preset: semantic-release

      - name: Checkout private repo at tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
          token: ${{ steps.vault.outputs.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Clone public repo
        run: |
          git clone \
            https://x-access-token:${{ steps.vault.outputs.GITHUB_TOKEN }}@github.com/contentful/experience-design-system-sdk-public.git \
            /tmp/public-repo
        env:
          GITHUB_TOKEN: ${{ steps.vault.outputs.GITHUB_TOKEN }}

      - name: Sync files to public repo
        run: |
          rsync -a --delete \
            --exclude='.git/' \
            --exclude='.bito/' \
            --exclude='.bito.yaml' \
            --exclude='**/node_modules/' \
            --exclude='**/dist/' \
            --exclude='tmp/' \
            --exclude='.nx/' \
            --exclude='**/.env' \
            --exclude='**/.env.*' \
            ./ /tmp/public-repo/
          # Public consumers install from npmjs.com, not GitHub Packages
          sed -i 's|https://npm.pkg.github.com|https://registry.npmjs.org|g' /tmp/public-repo/.npmrc

      - name: Commit and push to public repo
        run: |
          cd /tmp/public-repo
          git config user.name "contentful-automation[bot]"
          user_id=$(gh api "/users/contentful-automation[bot]" --jq .id)
          git config user.email "${user_id}+contentful-automation[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to sync — public repo is already up to date."
          else
            git commit -m "chore: release v${{ steps.version.outputs.version }}"
          fi
          git push origin main --force-with-lease
        env:
          GITHUB_TOKEN: ${{ steps.vault.outputs.GITHUB_TOKEN }}

      - name: Tag public repo
        run: |
          cd /tmp/public-repo
          git tag -f "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}" --force
        env:
          GITHUB_TOKEN: ${{ steps.vault.outputs.GITHUB_TOKEN }}

      - name: Trigger npm publish on public repo
        run: |
          gh workflow run publish-public.yml \
            --repo contentful/experience-design-system-sdk-public \
            --field version=${{ steps.version.outputs.version }} \
            --field dry_run=false
        env:
          GITHUB_TOKEN: ${{ steps.vault.outputs.GITHUB_TOKEN }}
